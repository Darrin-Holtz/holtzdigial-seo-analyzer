<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply theme class synchronously before first paint to prevent FOUC and
         the forced-reflow caused by ThemeContext resolving 'system' asynchronously.
         Must run before any <style> or <link rel="stylesheet"> in the document. -->
    <script>
      (function(){var s=localStorage.getItem('rankpilot-theme')||'system';document.documentElement.classList.add(s==='system'?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):s);})();
    </script>

    <title>Rank Pilot — AI SEO Analyzer</title>

    <!-- Primary Meta -->
    <meta name="description" content="Rank Pilot gives you instant AI-powered SEO audits for any website. Uncover hidden issues, analyze Core Web Vitals, track keyword rankings, and get actionable recommendations." />
    <meta name="keywords" content="SEO analyzer, SEO audit, website SEO checker, Core Web Vitals, keyword rank tracker, AI SEO tool, site performance" />
    <meta name="author" content="Holtz Digital" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="HvbhGdUBsKJloqQEHckyRcBsxxklbGgbzmMKMgzLURo" />
    <link rel="canonical" href="https://rankpilot.holtzdigital.com/" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Preconnect to critical origins -->
    <!-- crossorigin="use-credentials" matches the credentials:include fetch pool used by
         AppContext. The anonymous CORS pool (crossorigin / crossorigin="anonymous") is a
         separate socket pool in Chrome and is NOT reused for credentialed CORS requests. -->
    <link rel="preconnect" href="https://rankpilot-api.holtzdigital.com" crossorigin="use-credentials" />

    <!-- Self-hosted fonts: preload the two fonts used by the LCP element (H1).
         Outfit is the body font ("Analyze & Boost Your");
         DM Serif Display is used for the "SEO Rankings" span.
         Preloading both ensures they are available before React renders the H1,
         preventing late font-swap re-measurements that inflate LCP. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/outfit-variable-latin.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/dm-serif-display-regular-latin.woff2" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rankpilot.holtzdigital.com/" />
    <meta property="og:title" content="Rank Pilot — AI SEO Analyzer" />
    <meta property="og:description" content="Instant AI-powered SEO audits. Analyze performance, Core Web Vitals, keyword rankings, and more — free." />
    <meta property="og:site_name" content="Rank Pilot" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rank Pilot — AI SEO Analyzer" />
    <meta name="twitter:description" content="Instant AI-powered SEO audits. Analyze performance, Core Web Vitals, keyword rankings, and more — free." />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Rank Pilot",
      "url": "https://rankpilot.holtzdigital.com",
      "description": "AI-powered SEO analyzer that provides instant audits, Core Web Vitals analysis, keyword rank tracking, and actionable recommendations.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Holtz Digital",
        "url": "https://holtzdigital.com"
      }
    }
    </script>
    <!-- Start the auth-check fetch immediately during HTML parsing, before React
         loads. %VITE_BACKEND_URL% is replaced by Vite at build time (empty in
         dev → proxied to /api; full URL in production). The Promise is consumed
         by AppContext so setLoading(false) fires at React mount instead of
         ~800ms later. This also "uses" the preconnect so Chrome’s LCP
         critical path no longer includes a new TCP+TLS handshake. -->
    <script>try{window.__af=fetch('%VITE_BACKEND_URL%/api/auth/user',{credentials:'include'});}catch(_){}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
